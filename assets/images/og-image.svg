<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2c5282"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#63b3ed"/>
      <stop offset="100%" stop-color="#90cdf4"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装饰圆 -->
  <circle cx="1050" cy="120" r="180" fill="rgba(255,255,255,0.04)"/>
  <circle cx="150" cy="520" r="220" fill="rgba(255,255,255,0.03)"/>
  <circle cx="980" cy="480" r="100" fill="rgba(255,255,255,0.05)"/>

  <!-- 顶部色条 -->
  <rect x="80" y="120" width="60" height="6" fill="url(#accent)" rx="3"/>

  <!-- 主标题 -->
  <text x="80" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
        font-size="92" font-weight="800" fill="#ffffff">你的名字</text>

  <!-- 副标题 -->
  <text x="80" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
        font-size="36" font-weight="500" fill="#cbd5e0">Personal Homepage · 个人主页</text>

  <!-- 描述 -->
  <text x="80" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
        font-size="26" font-weight="400" fill="#e2e8f0">
    <tspan x="80" dy="0">研究方向 · 论文发表 · 项目展示</tspan>
    <tspan x="80" dy="40">博客 · 分享 · 阅读 · 简历</tspan>
  </text>

  <!-- 标签 chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="20" font-weight="600">
    <rect x="80" y="510" width="120" height="40" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="140" y="538" text-anchor="middle" fill="#ffffff">机器学习</text>

    <rect x="215" y="510" width="100" height="40" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="265" y="538" text-anchor="middle" fill="#ffffff">NLP</text>

    <rect x="330" y="510" width="140" height="40" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="400" y="538" text-anchor="middle" fill="#ffffff">深度学习</text>

    <rect x="485" y="510" width="160" height="40" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="565" y="538" text-anchor="middle" fill="#ffffff">大语言模型</text>
  </g>

  <!-- 域名 -->
  <text x="1120" y="600" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" font-weight="500" fill="rgba(255,255,255,0.6)">canyon-netizen.github.io</text>
</svg>