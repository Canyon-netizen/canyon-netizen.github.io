<header class="site-header">
    <div class="container header-inner">
        <a href="__BASE_NAV__index.html" class="brand">
            <span class="brand-mark">YN</span>
            <span class="brand-text">{{brandText}}</span>
        </a>
        <nav class="site-nav" id="site-nav">
            <a href="__BASE_NAV__index.html" class="nav-link{{navActive_index}}">{{navHome}}</a>
            <a href="__BASE_NAV__about.html" class="nav-link{{navActive_about}}">{{navAbout}}</a>
            <a href="__BASE_NAV__research.html" class="nav-link{{navActive_research}}">{{navResearch}}</a>
            <a href="__BASE_NAV__publications.html" class="nav-link{{navActive_publications}}">{{navPublications}}</a>
            <a href="__BASE_NAV__projects.html" class="nav-link{{navActive_projects}}">{{navProjects}}</a>
            <a href="__BASE_NAV__blog.html" class="nav-link{{navActive_blog}}">{{navBlog}}</a>
            <a href="__BASE_NAV__talks.html" class="nav-link{{navActive_talks}}">{{navTalks}}</a>
            <a href="__BASE_NAV__cv.html" class="nav-link{{navActive_cv}}">{{navCV}}</a>
        </nav>
        <div class="nav-actions">
            <button class="nav-action nav-search" id="search-trigger" title="{{searchTitle}}" aria-label="{{searchAriaLabel}}">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <a href="{{langHref}}" class="nav-action nav-lang" id="lang-toggle" title="{{langTitle}}" aria-label="{{langTitle}}">{{langText}}</a>
            <button class="nav-action nav-theme" id="theme-toggle" title="{{themeTitle}}" aria-label="{{themeTitle}}">
                <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="nav-toggle" id="nav-toggle" aria-label="{{navToggleLabel}}">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</header>
