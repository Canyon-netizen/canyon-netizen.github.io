<body>

    <template data-include="header"></template>

    <!-- 主页内容由 page-renderer.js 从 data.json 渲染 -->
    <main id="main-content" class="page-main">
        <div id="page-content">
            <!-- 顶部 hero -->
            <section class="hero" data-section="personal-hero">
                <div class="container hero-inner">
                    <div class="hero-text">
                        <p class="hero-eyebrow" data-hero-eyebrow></p>
                        <h1 class="hero-title">你好，我是 <span class="accent" data-hero-name></span></h1>
                        <p class="hero-subtitle" data-hero-subtitle></p>
                        <div class="hero-cta" data-hero-ctas></div>
                        <div class="hero-meta" data-hero-contacts></div>
                    </div>
                    <div class="hero-avatar">
                        <img loading="lazy" data-hero-avatar src="assets/images/profile.svg" alt="个人头像" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="avatar-placeholder">头像<br>占位</div>
                    </div>
                </div>
            </section>

            <!-- 统计信息 -->
            <section class="section" data-section="stats">
                <div class="container">
                    <h2 class="section-title">数据一览</h2>
                    <div class="stats-row reveal">
                        <div class="stat-card" data-stat="posts">
                            <div class="stat-icon" data-stat-icon></div>
                            <div class="stat-text">
                                <div class="stat-label" data-stat-label></div>
                                <div class="stat-value" data-stat-value></div>
                            </div>
                        </div>
                        <div class="stat-card" data-stat="publications">
                            <div class="stat-icon" data-stat-icon></div>
                            <div class="stat-text">
                                <div class="stat-label" data-stat-label></div>
                                <div class="stat-value" data-stat-value></div>
                            </div>
                        </div>
                        <div class="stat-card" data-stat="githubStars">
                            <div class="stat-icon" data-stat-icon></div>
                            <div class="stat-text">
                                <div class="stat-label" data-stat-label></div>
                                <div class="stat-value" data-stat-value></div>
                            </div>
                        </div>
                        <div class="stat-card" data-stat="visitors">
                            <div class="stat-icon" data-stat-icon></div>
                            <div class="stat-text">
                                <div class="stat-label" data-stat-label></div>
                                <div class="stat-value">
                                    <img loading="lazy" src="https://visitor-badge.glitch.me/badge?page_id=canyon-netizen.github.io" alt="访客" style="display:inline; height: 22px; vertical-align: middle;">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="github-chart reveal">
                        <img loading="lazy" data-contributions-chart src="https://ghchart.rshah.org/1e3a5f/Canyon-netizen" alt="GitHub 贡献图"
                             onerror="this.parentElement.style.display='none';">
                        <p class="github-chart-caption" data-contributions-caption></p>
                    </div>
                </div>
            </section>

            <!-- 个人概览 -->
            <section class="section section-alt" data-section="overview">
                <div class="container">
                    <h2 class="section-title">个人概览</h2>
                    <div class="info-grid">
                        <div class="info-card">
                            <h3>🎓 教育背景</h3>
                            <ul data-overview-education></ul>
                        </div>
                        <div class="info-card">
                            <h3>🔬 研究兴趣</h3>
                            <ul data-overview-interests></ul>
                        </div>
                        <div class="info-card" data-overview-status>
                            <h3>💼 当前状态</h3>
                            <p data-overview-affiliation></p>
                            <p data-overview-advisor></p>
                        </div>
                        <div class="info-card" data-overview-location>
                            <h3>📍 所在地</h3>
                            <p data-overview-city></p>
                            <p data-overview-note></p>
                        </div>
                    </div>
                </div>

            <!-- 最新动态 -->
            <section class="section section-alt" data-section="news">
                <div class="container">
                    <h2 class="section-title">最新动态</h2>
                    <ul class="timeline" data-news-list></ul>
                </div>
            </section>

            <!-- 代表性论文 -->
            <section class="section" data-section="featured-publications">
                <div class="container">
                    <h2 class="section-title">代表性论文 <a href="publications.html" class="see-all">查看全部 →</a></h2>
                    <div class="pub-list" data-featured-pubs></div>

            <section class="section section-alt" data-section="latest-posts">
                <div class="container">
                    <h2 class="section-title">最新博客 <a href="blog.html" class="see-all">所有文章 →</a></h2>
