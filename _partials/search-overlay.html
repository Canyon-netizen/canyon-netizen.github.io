<div class="search-overlay" id="search-overlay" role="dialog" aria-label="{{searchAriaLabel}}" aria-modal="true">
    <div class="search-modal">
        <div class="search-input-wrap">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-text-mute);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="search-input" id="search-input" placeholder="{{searchPlaceholder}}" autocomplete="off">
            <button class="search-close" id="search-close" aria-label="{{searchCloseLabel}}">&#10005;</button>
        </div>
        <div class="search-results" id="search-results">
            <div class="search-empty">{{searchEmptyText}}</div>
        </div>
    </div>
</div>
<script defer src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
